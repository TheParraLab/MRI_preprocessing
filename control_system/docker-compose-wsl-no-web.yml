services:
  control:
    container_name: control
    build:
      context: .
      dockerfile: dockerfile
    volumes:
      # - /var/run/docker.sock:/var/run/docker.sock
      - ${PROJECT_DIRECTORY_PATH}:/FL_system
      - ${DATA_DIRECTORY_PATH}:/data
      - ../app:/app
    environment:
      - DATA_DIRECTORY_PATH
      - PROJECT_DIRECTORY_PATH
      - NVIDIA_VISIBLE_DEVICES=all
      - NO_WEBSERVER=true
    # Override the default command to skip the Flask app
    command: ["bash", "-c", "echo 'MRI Preprocessing container started without webserver' && tail -f /dev/null"]
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
